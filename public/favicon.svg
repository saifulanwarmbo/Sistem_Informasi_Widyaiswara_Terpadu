<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1" />
      <stop offset="100%" stop-color="#1565C0" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1DE9B6" />
      <stop offset="100%" stop-color="#00BFA5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Base geometric shape representing stability and institution -->
    <path d="M256 32L464 128V384L256 480L48 384V128L256 32Z" fill="url(#primary-gradient)"/>
    <path d="M256 64V448L432 368V144L256 64Z" fill="#0A3A8A"/>
    
    <!-- Inner design representing growth, education and connectivity -->
    <path d="M256 128L384 192L256 256L128 192L256 128Z" fill="url(#accent-gradient)"/>
    <path d="M256 256L384 192V320L256 384L128 320V192L256 256Z" fill="#ffffff" opacity="0.1"/>
    
    <path d="M128 240L256 304L384 240v24L256 328L128 264v-24z" fill="url(#accent-gradient)" opacity="0.8"/>
    <path d="M128 288L256 352L384 288v24L256 376L128 312v-24z" fill="url(#accent-gradient)" opacity="0.6"/>
    
    <!-- Central node for individual growth (widyaiswara) -->
    <circle cx="256" cy="192" r="28" fill="#ffffff" />
    <circle cx="256" cy="192" r="14" fill="#0D47A1" />
  </g>
</svg>
